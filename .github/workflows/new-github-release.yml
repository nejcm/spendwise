# 🔗 Links:
# Source file: https://github.com/obytes/react-native-template-obytes/blob/master/.github/workflows/new-github-release.yml
# Starter releasing process: https://starter.obytes.com/ci-cd/app-releasing-process/

# ✍️ Description:
# This workflow will be triggered automatically after the new app version workflow has been executed successfully.
# It will create a new GitHub release with the new app version and the release notes.

# 🚨 GITHUB SECRETS REQUIRED: None

name: New GitHub Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    name: New GitHub Release
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message || '', '[release]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: 📦 Checkout project repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: 📦 Setup Node + PNPM + install deps
        uses: ./.github/actions/setup-node-pnpm-install

      - name: 🔎 Detect build skip flag
        id: build_flags
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"[skip-build]"* ]]; then
            echo "skip_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_build=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: 📦 Set Up JDK + Generate Release APK
        if: ${{ steps.build_flags.outputs.skip_build != 'true' }}
        uses: ./.github/actions/setup-jdk-generate-apk
        timeout-minutes: 45
        with:
          APP_ENV: production
        env:
          JAVA_TOOL_OPTIONS: -XX:MaxMetaspaceSize=1g
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx4g\ -Dfile.encoding=UTF-8

      - name: 🏷️ Read app version
        id: version
        run: printf 'apk_version=%s\n' "$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: 🏷️ Create version tag
        continue-on-error: true
        env:
          TAG_NAME: v${{ steps.version.outputs.apk_version }}
        run: |
          git tag "${TAG_NAME}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG_NAME}"
        shell: bash

      - name: 📦 Prepare APK asset
        if: ${{ steps.build_flags.outputs.skip_build != 'true' }}
        run: |
          cp ./android/app/build/outputs/apk/release/app-release.apk "./spendwise-${{ steps.version.outputs.apk_version }}.apk"
        shell: bash

      - name: 🏃‍♂️ Create Github Release with APK
        if: ${{ steps.build_flags.outputs.skip_build != 'true' }}
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.apk_version }}
          generateReleaseNotes: true
          draft: false
          artifacts: ./spendwise-${{ steps.version.outputs.apk_version }}.apk

      - name: 🏃‍♂️ Create Github Release without APK
        if: ${{ steps.build_flags.outputs.skip_build == 'true' }}
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.apk_version }}
          generateReleaseNotes: true
          draft: false
